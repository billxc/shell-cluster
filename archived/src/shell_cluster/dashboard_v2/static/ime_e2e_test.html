<h1>Shell Cluster IME E2E Test</h1>
<p class="subtitle">
  端到端测试: IME 事件 → xterm.js → AttachAddon → WebSocket → PTY → echo 回显验证。
  需要 shell server 运行在 ws://localhost:8765。
</p>
<div id="terminal-container"></div>

<script src="xterm.min.js"></script>
<script src="addon-fit.min.js"></script>

// ═══════════════════════════════════════════════════════════════════
// 配置
// ═══════════════════════════════════════════════════════════════════

// Shell server WebSocket 地址，与 app.js 中 peer.uri 对应
// Shell server WebSocket 地址
// 测试用独立实例，与生产环境隔离
// 启动方式: python3 tests/ime/start_test_server.py 18765
const SHELL_SERVER = 'ws://localhost:18765';

// 等待 shell prompt 的超时 (ms)
const PROMPT_WAIT = 2000;

// 等待 PTY echo 的超时 (ms)
const ECHO_WAIT = 2000;

// ═══════════════════════════════════════════════════════════════════
// Terminal 配置：与 app.js:302-320 完全一致
// ═══════════════════════════════════════════════════════════════════
function createTerm() {
  const container = document.getElementById('terminal-container');
  container.innerHTML = '';
  const term = new Terminal({
    cursorBlink: true,
    fontSize: 14,
    fontFamily: "'JetBrains Mono', 'Fira Code', 'Cascadia Code', Menlo, monospace",
    theme: {
      background: '#1e1e2e', foreground: '#cdd6f4', cursor: '#f5e0dc',
      selectionBackground: '#45475a', black: '#45475a', red: '#f38ba8',
      green: '#a6e3a1', yellow: '#f9e2af', blue: '#89b4fa',
      magenta: '#cba6f7', cyan: '#94e2d5', white: '#bac2de',
    },
  });
  const fitAddon = new FitAddon.FitAddon();
  term.loadAddon(fitAddon);
  term.open(container);
  fitAddon.fit();
  return { term, fitAddon };
}

// ═══════════════════════════════════════════════════════════════════
// WebSocket 连接：复刻 app.js:344-404 的连接流程
//
// 使用 /raw 端点 + AttachAddon，与生产环境完全一致。
// 返回 Promise，在 AttachAddon 加载完成后 resolve。
// ═══════════════════════════════════════════════════════════════════
function connectToShell(term, sessionId) {
  return new Promise((resolve, reject) => {
    const { cols, rows } = term;
    const wsUrl = `${SHELL_SERVER}/raw?session=${sessionId}&cols=${cols}&rows=${rows}`;
    log('dim', '  WebSocket: ' + wsUrl);

    const ws = new WebSocket(wsUrl);
    let attachAddon = null;
    let attached = false;

    ws.onmessage = (event) => {
      if (attached) return; // AttachAddon handles binary I/O
      const data = event.data;
      if (typeof data === 'string') {
        try {
          const msg = JSON.parse(data);
          if (msg.type === 'shell.created' || msg.type === 'shell.attached') {
            attached = true;
            // 加载 AttachAddon —— 与 app.js:386 完全一致
            attachAddon = new AttachAddon.AttachAddon(ws, { bidirectional: true });
            term.loadAddon(attachAddon);
            resolve({ ws, attachAddon });
            return;
          }
          if (msg.type === 'error') {
            reject(new Error(msg.error));
            return;
          }
        } catch (e) {}
      }
    };

    ws.onerror = () => reject(new Error('WebSocket connection failed'));
    ws.onclose = () => { if (!attached) reject(new Error('WebSocket closed before session created')); };

    setTimeout(() => { if (!attached) reject(new Error('Timeout waiting for shell.created')); }, 5000);
  });
}

// ═══════════════════════════════════════════════════════════════════
// 事件回放引擎（与 ime_test.html 相同）
//
// 关键: compositionend 后 yield 20ms，让 xterm 的 setTimeout(0)
// 从 textarea.value 读取最终组合文本。
// ═══════════════════════════════════════════════════════════════════
function dispatch(textarea, evt) {
  if (evt.type === 'keydown' || evt.type === 'keyup') {
    textarea.dispatchEvent(new KeyboardEvent(evt.type, {
      key: evt.key || '', code: evt.code || '',
      keyCode: evt.keyCode || 0, which: evt.keyCode || 0,
      isComposing: evt.isComposing || false,
      bubbles: true, cancelable: true,
    }));
  } else if (evt.type.startsWith('composition')) {
    if (evt.data != null) textarea.value = evt.data;
    textarea.dispatchEvent(new CompositionEvent(evt.type, {
      data: evt.data || '', bubbles: true, cancelable: true,
    }));
  } else if (evt.type === 'input') {
    if (evt.data != null) textarea.value = evt.data;
    textarea.dispatchEvent(new InputEvent(evt.type, {
      data: evt.data || null, inputType: evt.inputType || '',
      isComposing: evt.isComposing || false,
      bubbles: true, cancelable: true,
    }));
  }
}

async function dispatchAll(textarea, events) {
  for (const evt of events) {
    dispatch(textarea, evt);
    if (evt.type === 'compositionend') {
      await new Promise(r => setTimeout(r, 20));
    }
  }
}

// ═══════════════════════════════════════════════════════════════════
// Terminal buffer 读取
//
// 从 xterm 的 active buffer 中读取所有行的文本内容。
// 这是 PTY echo 回来后 xterm 实际渲染的内容。
// ═══════════════════════════════════════════════════════════════════
function readTerminalBuffer(term) {
  const buf = term.buffer.active;
  const lines = [];
  for (let i = 0; i <= buf.cursorY + buf.baseY; i++) {
    const line = buf.getLine(i);
    if (line) lines.push(line.translateToString(true));
  }
  return lines.join('\n');
}

// ═══════════════════════════════════════════════════════════════════
// Logging
// ═══════════════════════════════════════════════════════════════════
const outputEl = document.getElementById('output');
function log(cls, msg) {
  const line = document.createElement('div');
  line.className = cls;
  line.textContent = msg;
  outputEl.appendChild(line);
  console.log('[IME-E2E] ' + msg);
}

// ═══════════════════════════════════════════════════════════════════
// Test Runner
// ═══════════════════════════════════════════════════════════════════
async function runAll() {
  log('dim', 'Shell server: ' + SHELL_SERVER);
  log('dim', 'xterm.js: v6.0.0 (project local) + AttachAddon');
  log('dim', '');

  let totalPass = 0, totalFail = 0;
  const results = [];

  for (let i = 0; i < FIXTURES.length; i++) {
    const fix = FIXTURES[i];
    const sessionId = 'ime' + Math.random().toString(36).slice(2, 8);

    log('dim', '── #' + (i+1) + ' ' + fix.desc + ' ──');

    const { term, fitAddon } = createTerm();

    // 1. 连接 shell server，建立 PTY session
    let conn;
    try {
      conn = await connectToShell(term, sessionId);
      log('dim', '  Session created: ' + sessionId);
    } catch (err) {
      log('fail', 'FAIL [' + fix.name + '] ' + err.message);
      totalFail++;
      results.push({ name: fix.name, pass: false, error: err.message });
      term.dispose();
      continue;
    }

    // 2. 等待 shell prompt（让 PTY 初始化完成）
    await new Promise(r => setTimeout(r, PROMPT_WAIT));

    // 3. 回放 IME 事件
    const textarea = term.textarea;
    if (!textarea) {
      log('fail', 'FAIL [' + fix.name + '] Cannot find xterm textarea');
      totalFail++;
      results.push({ name: fix.name, pass: false, error: 'no textarea' });
      conn.ws.close();
      term.dispose();
      continue;
    }

    // 收集 onData 输出（xterm → WebSocket 发送方向）
    const onDataCollected = [];
    term.onData(data => onDataCollected.push(data));

    // 收集 PTY 回显（WebSocket → xterm 接收方向）
    const writeCollected = [];
    const origWrite = term.write.bind(term);
    term.write = function(data) {
      if (typeof data === 'string') writeCollected.push(data);
      else if (data instanceof Uint8Array) writeCollected.push(new TextDecoder().decode(data));
      return origWrite(data);
    };

    // 确保 textarea 获得焦点（headless 模式关键）
    textarea.focus();
    term.focus();
    await dispatchAll(textarea, fix.events);

    // 4. 等待 PTY echo 回显
    await new Promise(r => setTimeout(r, ECHO_WAIT));

    // 5. 验证
    //    - onData: xterm 发送给 PTY 的内容（发送方向）
    //    - writeCollected: PTY 回显写入 xterm 的内容（接收方向）
    const sentText = onDataCollected.join('');
    const receivedText = writeCollected.join('');
    const foundInSent = sentText.includes(fix.marker);
    const foundInReceived = receivedText.includes(fix.marker);

    if (foundInSent && foundInReceived) {
      log('pass', 'PASS [' + fix.name + '] marker "' + fix.marker + '" verified in both directions');
      log('dim', '  sent to PTY (onData): ' + JSON.stringify(onDataCollected));
      totalPass++;
      results.push({ name: fix.name, pass: true });
    } else if (foundInSent) {
      log('pass', 'PASS [' + fix.name + '] marker "' + fix.marker + '" sent to PTY (echo pending or shell config)');
      log('dim', '  sent to PTY (onData): ' + JSON.stringify(onDataCollected));
      log('dim', '  received from PTY: ' + (receivedText.length > 0 ? receivedText.substring(0, 100) : '(empty)'));
      totalPass++;
      results.push({ name: fix.name, pass: true, note: 'sent only' });
    } else {
      log('fail', 'FAIL [' + fix.name + '] marker "' + fix.marker + '" NOT found');
      log('info', '  sent to PTY (onData): ' + JSON.stringify(onDataCollected));
      log('info', '  received from PTY: ' + (receivedText.length > 0 ? receivedText.substring(0, 200) : '(empty)'));
      totalFail++;
      results.push({ name: fix.name, pass: false, marker: fix.marker, sent: sentText, received: receivedText.substring(0, 500) });
    }

    // 6. 关闭 session，等待完全清理后再跑下一个
    try {
      conn.ws.send(JSON.stringify({ type: 'shell.close', session_id: sessionId }));
    } catch (e) {}
    await new Promise(r => setTimeout(r, 500));
    conn.ws.close();
    term.dispose();
    // 等待服务端完全释放 PTY 资源
    await new Promise(r => setTimeout(r, 1500));

    log('dim', '');
  }

  if (totalFail === 0) {
    log('pass', '=== ALL ' + totalPass + ' E2E TESTS PASSED ===');
  } else {
    log('fail', '=== ' + totalFail + ' FAILED, ' + totalPass + ' passed ===');
  }

  document.body.setAttribute('data-results', JSON.stringify({ passed: totalPass, failed: totalFail, results }));
  console.log('[IME-E2E-RESULT] ' + JSON.stringify({ passed: totalPass, failed: totalFail, results }));
}

runAll();
</script>
