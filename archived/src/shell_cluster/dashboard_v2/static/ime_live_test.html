<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>IME Live Test</title>
<link rel="stylesheet" href="xterm.min.css">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: #1e1e2e; color: #cdd6f4; display: flex; flex-direction: column; height: 100vh; }
header { padding: 8px 16px; background: #181825; border-bottom: 1px solid #313244; font-size: 13px; display: flex; align-items: center; gap: 12px; }
header h1 { font-size: 15px; color: #89b4fa; }
#status { color: #6c7086; }
.main { flex: 1; display: flex; min-height: 0; }
#terminal-container { flex: 1; }
#log-panel { width: 420px; border-left: 1px solid #313244; display: flex; flex-direction: column; }
#log-panel h2 { font-size: 12px; padding: 6px 12px; background: #181825; color: #6c7086; border-bottom: 1px solid #313244; }
#js-log { flex: 1; overflow-y: auto; padding: 8px; font-family: 'JetBrains Mono', monospace; font-size: 11px; }
.log-entry { margin-bottom: 4px; padding: 3px 6px; border-radius: 3px; }
.log-ondata { background: #1e3a2e; color: #a6e3a1; }
.log-comp { background: #1e2a3e; color: #89b4fa; }
.log-key { background: #2a2a2a; color: #6c7086; }
.log-info { background: #2a2520; color: #f9e2af; }
button { padding: 4px 10px; border: 1px solid #313244; border-radius: 4px; background: #181825; color: #cdd6f4; cursor: pointer; font-size: 12px; }
button:hover { background: #313244; }
</style>
</head>
<body>
<header>
  <h1>IME Live Test</h1>
  <span id="status">Connecting...</span>
  <button onclick="clearLog()">Clear Log</button>
  <button onclick="downloadLog()">Download Log</button>
</header>
<div class="main">
  <div id="terminal-container"></div>
  <div id="log-panel">
    <h2>JS Side Log (onData / composition events)</h2>
    <div id="js-log"></div>
  </div>
</div>

<script src="xterm.min.js"></script>
<script src="addon-fit.min.js"></script>
<script src="addon-attach.min.js"></script>
<script>
const SHELL_SERVER = 'ws://localhost:18765';
const logEl = document.getElementById('js-log');
const statusEl = document.getElementById('status');
const logEntries = [];

function toHex(str) {
  return Array.from(str).map(ch => {
    const cp = ch.codePointAt(0);
    if (cp === 0x0d) return '\\r';
    if (cp === 0x0a) return '\\n';
    if (cp === 0x7f) return '\\x7f';
    if (cp < 0x20) return '\\x' + cp.toString(16).padStart(2, '0');
    return cp > 0x7f ? 'U+' + cp.toString(16).toUpperCase().padStart(4, '0') : ch;
  }).join('');
}

function addLog(cls, text) {
  const entry = { ts: Date.now(), cls, text };
  logEntries.push(entry);
  const div = document.createElement('div');
  div.className = 'log-entry log-' + cls;
  div.textContent = text;
  logEl.appendChild(div);
  logEl.scrollTop = logEl.scrollHeight;
}

function clearLog() { logEl.innerHTML = ''; logEntries.length = 0; }
function downloadLog() {
  const blob = new Blob([JSON.stringify(logEntries, null, 2)], { type: 'application/json' });
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
  a.download = 'ime_js_log.json'; a.click();
}

// ── Terminal ──
const term = new Terminal({
  cursorBlink: true, fontSize: 14,
  fontFamily: "'JetBrains Mono', 'Fira Code', 'Cascadia Code', Menlo, monospace",
  theme: {
    background: '#1e1e2e', foreground: '#cdd6f4', cursor: '#f5e0dc',
    selectionBackground: '#45475a', black: '#45475a', red: '#f38ba8',
    green: '#a6e3a1', yellow: '#f9e2af', blue: '#89b4fa',
    magenta: '#cba6f7', cyan: '#94e2d5', white: '#bac2de',
  },
});
const fitAddon = new FitAddon.FitAddon();
term.loadAddon(fitAddon);
term.open(document.getElementById('terminal-container'));
fitAddon.fit();
window.addEventListener('resize', () => fitAddon.fit());

// ── Log onData (JS → PTY) ──
term.onData(data => {
  addLog('ondata', '[onData→PTY] "' + toHex(data) + '"');
});

// ── Log composition events ──
const textarea = term.textarea;
if (textarea) {
  textarea.addEventListener('compositionstart', e => {
    addLog('comp', '[compositionstart] data="' + (e.data || '') + '"');
  }, true);
  textarea.addEventListener('compositionupdate', e => {
    addLog('comp', '[compositionupdate] data="' + (e.data || '') + '"');
  }, true);
  textarea.addEventListener('compositionend', e => {
    addLog('comp', '[compositionend] data="' + (e.data || '') + '"');
  }, true);
  textarea.addEventListener('keydown', e => {
    if (e.keyCode === 229 || e.isComposing) {
      addLog('key', '[keydown] key=' + e.key + ' code=' + e.code + ' keyCode=' + e.keyCode + ' isComposing=' + e.isComposing);
    }
  }, true);
}

// ── Connect to test shell server ──
const sessionId = 'live' + Math.random().toString(36).slice(2, 8);
const wsUrl = SHELL_SERVER + '/raw?session=' + sessionId + '&cols=' + term.cols + '&rows=' + term.rows;
statusEl.textContent = 'Connecting to ' + wsUrl + '...';
addLog('info', 'Connecting: ' + wsUrl);

const ws = new WebSocket(wsUrl);
let attached = false;

ws.onmessage = (event) => {
  if (attached) return;
  if (typeof event.data === 'string') {
    try {
      const msg = JSON.parse(event.data);
      if (msg.type === 'shell.created' || msg.type === 'shell.attached') {
        attached = true;
        const attachAddon = new AttachAddon.AttachAddon(ws, { bidirectional: true });
        term.loadAddon(attachAddon);
        statusEl.textContent = 'Connected (session=' + sessionId + ')';
        addLog('info', 'Session created. Start typing with your IME!');
        term.focus();
      }
    } catch (e) {}
  }
};

ws.onerror = () => { statusEl.textContent = 'Connection failed'; addLog('info', 'ERROR: WebSocket failed'); };
ws.onclose = () => { statusEl.textContent = 'Disconnected'; addLog('info', 'WebSocket closed'); };
</script>
</body>
</html>
