<h1>Shell Cluster IME Test</h1>
<p class="subtitle">
  回放真实录制的 CJK 输入法事件，验证 xterm.js 的 CompositionHelper 是否正确处理 IME 输入。
  使用项目自身的 xterm.min.js (v6.0.0)，Terminal 配置与 app.js:302-320 完全一致。
</p>

<script>
// ═══════════════════════════════════════════════════════════════════
// Terminal 配置
// 完全复刻 app.js:302-320 的 Terminal 构造参数。
// 如果 app.js 的配置发生变化，此处需同步更新。
// ═══════════════════════════════════════════════════════════════════
function createTerm() {
  const container = document.getElementById('terminal-container');
  container.innerHTML = '';
  const term = new Terminal({
    cursorBlink: true,
    fontSize: 14,
    fontFamily: "'JetBrains Mono', 'Fira Code', 'Cascadia Code', Menlo, monospace",
    theme: {
      background: '#1e1e2e',
      foreground: '#cdd6f4',
      cursor: '#f5e0dc',
      selectionBackground: '#45475a',
      black: '#45475a',
      red: '#f38ba8',
      green: '#a6e3a1',
      yellow: '#f9e2af',
      blue: '#89b4fa',
      magenta: '#cba6f7',
      cyan: '#94e2d5',
      white: '#bac2de',
    },
  });
  const fitAddon = new FitAddon.FitAddon();
  term.loadAddon(fitAddon);
  term.open(container);
  fitAddon.fit();
  return term;
}

// ═══════════════════════════════════════════════════════════════════
// App keyboard handler（复刻 app.js:503-515）
//
// 这是一个已知的 bug 目标：document 级 keydown 监听器没有检查
// e.isComposing，导致 Alt+[/] 在 IME 组合输入期间可能误触发
// tab 切换。这里复刻它以检测该问题。
//
// 修复方法：在 handler 开头加 `if (e.isComposing) return;`
// ═══════════════════════════════════════════════════════════════════
function installAppKeyboardHandler() {
  document.addEventListener('keydown', function _imeTestHandler(e) {
    if (e.altKey && (e.key === '[' || e.key === ']')) {
      e.preventDefault();
      log('info', '  [EVENT] Alt+' + e.key + ' tab switch triggered during isComposing=' + e.isComposing);
      if (e.isComposing) {
        window.__altTriggeredDuringComposition = true;
      }
    }
  });
}

// ═══════════════════════════════════════════════════════════════════
// 事件回放引擎
//
// 将录制的 DOM 事件序列 dispatch 到 xterm.js 的内部 textarea。
//
// 关键问题与解决方案：
//
//   问题: 浏览器的 synthetic CompositionEvent 不会像真实 IME 那样
//         自动更新 textarea.value。而 xterm.js 的 CompositionHelper
//         在 compositionend 后通过 setTimeout(0) 从 textarea.value
//         读取最终组合文本。
//
//   方案: 在 dispatch composition/input 事件前，手动设置
//         textarea.value = evt.data。在 compositionend 后 yield
//         控制权（await setTimeout(20ms)），确保 xterm 的延迟回调
//         能在下一个事件之前执行完毕。
//
// 这是 Playwright/Puppeteer 模拟 IME 的标准做法。
// ═══════════════════════════════════════════════════════════════════
function dispatch(textarea, evt) {
  // ── KeyboardEvent: keydown / keyup ──
  if (evt.type === 'keydown' || evt.type === 'keyup') {
    textarea.dispatchEvent(new KeyboardEvent(evt.type, {
      key: evt.key || '', code: evt.code || '',
      keyCode: evt.keyCode || 0, which: evt.keyCode || 0,
      isComposing: evt.isComposing || false,
      bubbles: true, cancelable: true,
    }));
    return;
  }

  // ── CompositionEvent: compositionstart / compositionupdate / compositionend ──
  // 在 dispatch 前设置 textarea.value，模拟浏览器更新 textarea 内容
  if (evt.type.startsWith('composition')) {
    if (evt.data != null) textarea.value = evt.data;
    textarea.dispatchEvent(new CompositionEvent(evt.type, {
      data: evt.data || '', bubbles: true, cancelable: true,
    }));
    return;
  }

  // ── InputEvent: input ──
  // inputType 区分 "insertCompositionText"（IME 中间态）
  // 和 "insertText"（最终确认或普通输入）
  if (evt.type === 'input') {
    if (evt.data != null) textarea.value = evt.data;
    textarea.dispatchEvent(new InputEvent(evt.type, {
      data: evt.data || null, inputType: evt.inputType || '',
      isComposing: evt.isComposing || false,
      bubbles: true, cancelable: true,
    }));
  }
}

/**
 * 按顺序 dispatch 所有事件，在 compositionend 后 yield 控制权。
 *
 * xterm.js CompositionHelper._finalizeComposition 流程:
 *   compositionend → setTimeout(0) → 读取 textarea.value → triggerDataEvent
 *
 * 如果不 yield，下一个事件会在 setTimeout(0) 之前覆盖 textarea.value，
 * 导致 xterm 读到错误的值（或空值），composition 文本丢失。
 */
async function dispatchAll(textarea, events) {
  for (const evt of events) {
    dispatch(textarea, evt);
    if (evt.type === 'compositionend') {
      await new Promise(r => setTimeout(r, 20));
    }
  }
}

// 辅助函数
// ═══════════════════════════════════════════════════════════════════

/** 将字符串转为可读的 hex 表示，方便调试不可见字符 */
function toHex(str) {
  return Array.from(str).map(ch => {
    const cp = ch.codePointAt(0);
    if (cp === 0x0d) return '\\r';
    if (cp === 0x0a) return '\\n';
    if (cp === 0x7f) return '\\x7f';
    if (cp < 0x20) return '\\x' + cp.toString(16).padStart(2, '0');
    return cp > 0x7f ? 'U+' + cp.toString(16).toUpperCase().padStart(4, '0') : ch;
  }).join(' ');
}

// ═══════════════════════════════════════════════════════════════════
// Logging
// 同时输出到页面 DOM 和 console，方便 headless 和浏览器两种模式。
// console 输出带 [IME-TEST] 前缀，便于 grep 过滤。
// 最终结果写入 body[data-results] JSON 属性，供自动化脚本读取。
// ═══════════════════════════════════════════════════════════════════
const outputEl = document.getElementById('output');
function log(cls, msg) {
  const line = document.createElement('div');
  line.className = cls;
  line.textContent = msg;
  outputEl.appendChild(line);
  console.log('[IME-TEST] ' + msg);
}

// ═══════════════════════════════════════════════════════════════════
// Test Runner
// ═══════════════════════════════════════════════════════════════════
async function runAll() {
  installAppKeyboardHandler();
  log('dim', 'xterm.js version: 6.0.0 (project local)');
  log('dim', 'Terminal config: mirrored from app.js:302-320');
  log('dim', '');

  let totalPass = 0, totalFail = 0;
  const results = [];

  for (const fix of FIXTURES) {
    log('dim', '── ' + fix.desc + ' ──');

    const term = createTerm();
    const collected = [];
    term.onData(data => collected.push(data));
    term.focus();

    const textarea = term.textarea;
    if (!textarea) {
      log('fail', 'FAIL [' + fix.name + '] Cannot find xterm textarea');
      totalFail++;
      results.push({ name: fix.name, pass: false, error: 'no textarea' });
      term.dispose();
      continue;
    }

    window.__altTriggeredDuringComposition = false;

    await dispatchAll(textarea, fix.events);
    await new Promise(r => setTimeout(r, 100));

    const output = collected.join('');
    const expected = fix.expected;
    const match = output === expected;
    const contains = !match && output.includes(expected);

    if (match) {
      log('pass', 'PASS [' + fix.name + ']');
      log('dim', '  onData output: "' + expected + '"');
      totalPass++;
      results.push({ name: fix.name, pass: true });
    } else if (contains) {
      log('pass', 'PASS [' + fix.name + '] (contains expected)');
      log('dim', '  onData output: "' + output + '"');
      totalPass++;
      results.push({ name: fix.name, pass: true, note: 'contains' });
    } else {
      log('fail', 'FAIL [' + fix.name + ']');
      log('info', '  expected: "' + expected + '"');
      log('info', '  expected hex: ' + toHex(expected));
      log('info', '  got:      "' + output + '"');
      log('info', '  got hex:  ' + toHex(output));
      totalFail++;
      results.push({ name: fix.name, pass: false, expected, got: output });
    }

    // Check isComposing guard bug
    if (window.__altTriggeredDuringComposition) {
      log('fail', 'BUG  [' + fix.name + '] Alt+[/] fired during IME composition (missing isComposing guard in app.js:503)');
    }

    log('dim', '');
    term.dispose();
  }

  if (totalFail === 0) {
    log('pass', '=== ALL ' + totalPass + ' TESTS PASSED ===');
  } else {
    log('fail', '=== ' + totalFail + ' FAILED, ' + totalPass + ' passed ===');
  }

  // Machine-readable result for CI / headless scripts
  document.body.setAttribute('data-results', JSON.stringify({ passed: totalPass, failed: totalFail, results }));
  console.log('[IME-TEST-RESULT] ' + JSON.stringify({ passed: totalPass, failed: totalFail, results }));
}

runAll();
</script>
