h1 { font-size: 18px; color: #60a5fa; margin-bottom: 16px; }
.summary { font-size: 14px; margin-bottom: 20px; padding: 12px; background: #16213e; border-radius: 6px; }
.summary .pass { color: #4ade80; font-weight: 600; }
.summary .fail { color: #ef4444; font-weight: 600; }
.test-case { border: 1px solid #0f3460; border-radius: 6px; margin-bottom: 12px; overflow: hidden; }
.test-header { padding: 10px 16px; background: #16213e; display: flex; align-items: center; gap: 10px; cursor: pointer; }

.test-header .status.fail { background: #531616; color: #ef4444; }
.test-header .status.running { background: #162e53; color: #60a5fa; }
.test-header .status.pending { background: #2a2a2a; color: #666; }
.test-details { padding: 12px 16px; font-family: 'JetBrains Mono', monospace; font-size: 12px; border-top: 1px solid #0f3460; display: none; }
.test-details.show { display: block; }
.test-details pre { background: #0f0f1a; padding: 8px; border-radius: 4px; margin: 4px 0 8px; white-space: pre-wrap; word-break: break-all; }
.test-details .label { color: #888; font-size: 11px; }
#xterm-offscreen { position: absolute; left: -9999px; top: -9999px; width: 800px; height: 400px; }
</style>

// ─── Test Engine ───────────────────────────────────────────────────

function createTestTerminal() {
  const container = document.getElementById('xterm-offscreen');
  container.innerHTML = '';

  const term = new Terminal({
    cursorBlink: false,
    fontSize: 14,
    fontFamily: "'JetBrains Mono', 'Fira Code', monospace",
    theme: { background: '#1a1a2e', foreground: '#e0e0e0' },
  });

  const fitAddon = new FitAddon.FitAddon();
  term.loadAddon(fitAddon);
  term.open(container);
  fitAddon.fit();

  return term;
}

function dispatchEvent(textarea, evt) {
  if (evt.type === 'keydown' || evt.type === 'keyup') {
    textarea.dispatchEvent(new KeyboardEvent(evt.type, {
      key: evt.key || '', code: evt.code || '',
      keyCode: evt.keyCode || 0, which: evt.keyCode || 0,
      isComposing: evt.isComposing || false,
      bubbles: true, cancelable: true,
    }));
  } else if (evt.type.startsWith('composition')) {
    if (evt.data != null) textarea.value = evt.data;
    textarea.dispatchEvent(new CompositionEvent(evt.type, {
      data: evt.data || '', bubbles: true, cancelable: true,
    }));
  } else if (evt.type === 'input') {
    if (evt.data != null) textarea.value = evt.data;
    textarea.dispatchEvent(new InputEvent(evt.type, {
      data: evt.data || null, inputType: evt.inputType || '',
      isComposing: evt.isComposing || false,
      bubbles: true, cancelable: true,
    }));
  }
}

async function runFixture(fixture) {
  const term = createTestTerminal();
  const collected = [];

  // Local echo + collect
  term.onData(data => collected.push(data));
  term.focus();

  const textarea = term.textarea;
  if (!textarea) {
    term.dispose();
    return { pass: false, collected: '', error: 'Cannot find xterm textarea' };
  }

  // Dispatch all events
  for (const evt of fixture.events) {
    dispatchEvent(textarea, evt);
  }

  // Wait for deferred composition processing
  await new Promise(r => setTimeout(r, 100));

  const output = collected.join('');
  term.dispose();

  const expected = fixture.expectedOutput || '';
  if (!expected) {
    return { pass: true, collected: output, expected, note: 'No expectedOutput, captured only' };
  }

  const pass = output === expected || output.includes(expected);
  return { pass, collected: output, expected };
}

function toHex(str) {
  return Array.from(str).map(ch => {
    const cp = ch.codePointAt(0);
    if (cp === 0x0d) return '\\r';
    if (cp === 0x0a) return '\\n';
    if (cp === 0x7f) return '\\x7f';
    if (cp < 0x20) return `\\x${cp.toString(16).padStart(2,'0')}`;
    return cp > 0x7f ? `U+${cp.toString(16).toUpperCase().padStart(4, '0')}` : ch;
  }).join(' ');
}

function renderResult(idx, fixture, result) {
  const caseEl = document.createElement('div');
  caseEl.className = 'test-case';

  const statusClass = result.pass ? 'pass' : 'fail';
  const statusText = result.pass ? 'PASS' : 'FAIL';
  const icon = result.pass ? '✓' : '✗';

  const events = fixture.events;
  const compositionCount = events.filter(e => e.type.startsWith('composition')).length;
  const imeKeydowns = events.filter(e => e.type === 'keydown' && e.keyCode === 229).length;

  caseEl.innerHTML = `
    <div class="test-header" onclick="this.nextElementSibling.classList.toggle('show')">
      <span class="icon">${icon}</span>
      <span class="name">#${idx + 1} ${fixture.metadata.description}</span>
      <span class="status ${statusClass}">${statusText}</span>
    </div>
    <div class="test-details">
      <span class="label">Events: ${events.length} total, ${compositionCount} composition, ${imeKeydowns} IME keydowns</span>
      <span class="label"> | IME: ${fixture.metadata.imeMethod || 'N/A'}</span>

      <p style="margin-top:8px"><span class="label">Expected:</span></p>
      <pre>"${escHtml(result.expected)}"
${toHex(result.expected)}</pre>

      <p><span class="label">Collected onData:</span></p>
      <pre>"${escHtml(result.collected)}"
${toHex(result.collected)}</pre>

      ${result.error ? `<p style="color:#ef4444">${result.error}</p>` : ''}
      ${result.note ? `<p style="color:#fbbf24">${result.note}</p>` : ''}
    </div>
  `;

  return caseEl;
}

function escHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

async function runAll() {
  const resultsEl = document.getElementById('results');
  const summaryEl = document.getElementById('summary');
  resultsEl.innerHTML = '';

  let passed = 0, failed = 0;

  for (let i = 0; i < FIXTURES.length; i++) {
    const fixture = FIXTURES[i];
    summaryEl.textContent = `Running ${i + 1} / ${FIXTURES.length}: ${fixture.metadata.description}...`;

    const result = await runFixture(fixture);
    if (result.pass) passed++; else failed++;

    resultsEl.appendChild(renderResult(i, fixture, result));
  }

  summaryEl.innerHTML = `
    <span class="pass">${passed} passed</span> /
    <span class="fail">${failed} failed</span> /
    ${FIXTURES.length} total
    ${failed === 0 ? ' — All tests passed!' : ''}
  `;
}

runAll();
</script>
