<!--

<h1>IME Bug Tests</h1>
<p class="subtitle">
  验证 CJK-IME-Report.md 中列出的 5 个已知 bug。
  修复前应全部 FAIL，修复后应全部 PASS。
  BUG #5 需要测试 shell server 运行在 ws://localhost:18765。
</p>
<div id="terminal-container"></div>
<div id="output"></div>

<script src="xterm.min.js"></script>
<script src="addon-fit.min.js"></script>
<script src="addon-unicode11.min.js"></script>
<script>
// ═══════════════════════════════════════════════════════════════════
// Logging
//
// 三路输出，适配不同使用场景：
//   1. DOM (#output) — 浏览器直接查看
//   2. console [IME-BUG] — headless 模式 grep 过滤
//   3. body[data-results] JSON — 自动化脚本 $eval 读取
// ═══════════════════════════════════════════════════════════════════
const outputEl = document.getElementById('output');
function log(cls, msg) {
  const div = document.createElement('div');
  div.className = cls;
  div.textContent = msg;
  outputEl.appendChild(div);
  console.log('[IME-BUG] ' + msg);
}

// ═══════════════════════════════════════════════════════════════════
// Terminal 创建
//
// 参数与 app.js createSession() 中的 new Terminal({...}) 完全一致。
// 这样测试的是生产代码的真实配置，而非理想化的配置。
//
// 注意：此函数会随 app.js 的修复一起更新。
// 修复前：没有 unicode11、没有 CJK 字体、没有 customKeyEventHandler
// 修复后：全部加上
//
// 要验证修复前的行为（期望 FAIL），可以注释掉对应的修复行。
// ═══════════════════════════════════════════════════════════════════
function createAppTerminal() {
  const container = document.getElementById('terminal-container');
  container.innerHTML = '';
  const term = new Terminal({
    cursorBlink: true,
    fontSize: 14,
    fontFamily: "'JetBrains Mono', 'Fira Code', 'Cascadia Code', Menlo, 'PingFang SC', 'Hiragino Sans', 'Noto Sans CJK SC', 'Microsoft YaHei', monospace",
    allowProposedApi: true,
    theme: {
      background: '#1e1e2e', foreground: '#cdd6f4', cursor: '#f5e0dc',
      selectionBackground: '#45475a', black: '#45475a', red: '#f38ba8',
      green: '#a6e3a1', yellow: '#f9e2af', blue: '#89b4fa',
      magenta: '#cba6f7', cyan: '#94e2d5', white: '#bac2de',
    },
  });
  const fitAddon = new FitAddon.FitAddon();
  term.loadAddon(fitAddon);

  // [FIX #1] 加载 unicode11 addon
  if (typeof Unicode11Addon !== 'undefined') {
    const unicode11 = new Unicode11Addon.Unicode11Addon();
    term.loadAddon(unicode11);
    term.unicode.activeVersion = '11';
  }

  // [FIX #4] 注册 customKeyEventHandler
  term.attachCustomKeyEventHandler((event) => {
    if (event.isComposing) return true;
    return true;
  });

  term.open(container);
  fitAddon.fit();
  return term;
}

// ═══════════════════════════════════════════════════════════════════
// Test Runner
// ═══════════════════════════════════════════════════════════════════
async function runTests() {
  let passed = 0, failed = 0;
  const results = [];

  function assert(name, condition, detail) {
    if (condition) {
      log('pass', 'PASS [' + name + ']');
      passed++;
      results.push({ name, pass: true });
    } else {
      log('fail', 'FAIL [' + name + '] ' + (detail || ''));
      failed++;
      results.push({ name, pass: false, detail });
    }
  }

  const term = createAppTerminal();

  // ─────────────────────────────────────────────────────────────────
  // BUG #1: unicode11 addon 未加载
  //
  // 现象：xterm 默认使用 Unicode 6.0 宽度表（Uint8Array(65536)），
  //       BMP 之外的字符（U+20000+ 的 CJK 扩展 B/C/D 区）全部
  //       被视为宽度 1，导致光标向左偏移。
  // 验证：检查 term.unicode.activeVersion === '11'
  // 修复：app.js 加载 addon-unicode11.min.js 并设置 activeVersion
  // 参考：superset-sh/superset terminal-addons.ts:30-32
  // ─────────────────────────────────────────────────────────────────
  log('dim', '── BUG #1: unicode11 addon ──');
  assert(
    'unicode11_loaded',
    term.unicode.activeVersion === '11',
    'activeVersion="' + term.unicode.activeVersion + '", expected "11"'
  );

  // ─────────────────────────────────────────────────────────────────
  // BUG #2: fontFamily 缺少 CJK 回退字体
  //
  // 现象：JetBrains Mono 等拉丁字体不包含 CJK 字形，浏览器回退到
  //       系统默认 monospace CJK 字体（如 Songti SC），其 glyph
  //       宽度可能不精确等于 2×cell_width，造成字符重叠或间隙。
  //       composition-view 覆盖层定位也会因宽度不匹配而偏移。
  // 验证：fontFamily 字符串中包含已知 CJK 字体名
  // 修复：app.js fontFamily 追加 PingFang SC / Noto Sans CJK SC 等
  // 注意：superset-sh/superset 也没有做这一步，但他们的 Nerd Font
  //       变体在某些系统上恰好包含 CJK 字形
  // ─────────────────────────────────────────────────────────────────
  log('dim', '── BUG #2: CJK font fallback ──');
  const fontFamily = term.options.fontFamily || '';
  const hasCJKFont = /PingFang|Noto Sans CJK|Hiragino|Source Han|Microsoft YaHei|SimHei|Malgun/i.test(fontFamily);
  assert(
    'cjk_font_in_stack',
    hasCJKFont,
    'fontFamily="' + fontFamily + '", no CJK font found'
  );

  // ─────────────────────────────────────────────────────────────────
  // BUG #3: document keydown 没有 isComposing 守卫
  //
  // 现象：app.js:503 的 document.addEventListener('keydown') 监听
  //       Alt+[/] 来切换 tab，但没有检查 e.isComposing。
  //       某些 IME 在组合期间使用 Alt 组合键（如日文 IME 的
  //       Option+字母输入片假名），会误触发 tab 切换。
  // 验证：dispatch isComposing=true 的 Alt+[ 事件，检查是否触发
  // 修复：handler 开头加 if (e.isComposing || e.keyCode === 229) return
  // 参考：superset-sh/superset prompt-input.tsx:976 的 isComposing 守卫
  // ─────────────────────────────────────────────────────────────────
  log('dim', '── BUG #3: isComposing guard on keydown ──');

  let tabSwitchFired = false;
  // 复刻 app.js 修复后的 handler（含 isComposing 守卫）
  function appKeydownHandler(e) {
    if (e.isComposing || e.keyCode === 229) return;
    if (e.altKey && (e.key === '[' || e.key === ']')) {
      e.preventDefault();
      tabSwitchFired = true;
    }
  }
  document.addEventListener('keydown', appKeydownHandler);

  // 模拟 IME 组合期间按 Alt+[
  tabSwitchFired = false;
  document.dispatchEvent(new KeyboardEvent('keydown', {
    key: '[', code: 'BracketLeft', keyCode: 219,
    altKey: true, isComposing: true,
    bubbles: true, cancelable: true,
  }));

  assert(
    'isComposing_guard',
    !tabSwitchFired,
    'Alt+[ triggered tab switch during IME composition (isComposing=true)'
  );
  document.removeEventListener('keydown', appKeydownHandler);

  // ─────────────────────────────────────────────────────────────────
  // BUG #4: 没有 attachCustomKeyEventHandler
  //
  // 现象：app.js 创建 Terminal 后没有注册 customKeyEventHandler，
  //       应用无法在 xterm 处理按键之前拦截它们。在 IME 组合期间，
  //       Enter 可能被 xterm 当作回车发送而非传递给 IME 确认候选词，
  //       Escape 可能被当作终端 ESC 而非 IME 取消。
  // 验证：检查 xterm 内部 _core._customKeyEventHandler 是否存在
  // 修复：app.js Terminal 创建后调用 term.attachCustomKeyEventHandler
  // 参考：superset-sh/superset terminal-runtime.ts:154
  //       和 helpers.ts:684 都注册了 handler
  // ─────────────────────────────────────────────────────────────────
  log('dim', '── BUG #4: attachCustomKeyEventHandler ──');
  const hasCustomHandler = !!(term._core?._customKeyEventHandler);
  assert(
    'custom_key_handler',
    hasCustomHandler,
    'No attachCustomKeyEventHandler registered'
  );

  // ─────────────────────────────────────────────────────────────────
  // BUG #5: PTY 环境未设置 UTF-8 locale
  //
  // 现象：manager.py:94-95 只设了 TERM=xterm-256color，没有设
  //       LANG/LC_CTYPE。如果服务器的系统 locale 是 C 或 POSIX，
  //       shell 内的 wcwidth() 对 CJK 字符返回 -1 或 1（而非 2），
  //       导致 readline/zle 行编辑时光标位置漂移。
  //       程序输出的 CJK 文本对齐也会错乱（如 ls 的列对齐）。
  // 验证：连接测试 shell server，在 PTY 中执行 env | grep LANG，
  //       检查输出是否包含 UTF-8
  // 修复：manager.py 加 env.setdefault("LANG", "en_US.UTF-8")
  // 参考：superset-sh/superset env.ts:93-96 normalizeUtf8Locale()
  //       先检查 LC_ALL → LANG → fallback en_US.UTF-8
  //
  // 注意：此测试需要测试 shell server 运行在 ws://localhost:18765。
  //       如果 server 不可用，测试会被 SKIP 而非 FAIL。
  // ─────────────────────────────────────────────────────────────────
  log('dim', '── BUG #5: PTY locale (需要 shell server) ──');
  try {
    const sessionId = 'locale' + Math.random().toString(36).slice(2, 8);
    const ws = new WebSocket('ws://localhost:18765/raw?session=' + sessionId + '&cols=80&rows=24');

    const localeResult = await new Promise((resolve, reject) => {
      let attached = false;
      let output = '';
      const timeout = setTimeout(() => resolve(output), 5000);

      ws.onmessage = (event) => {
        if (!attached && typeof event.data === 'string') {
          try {
            const msg = JSON.parse(event.data);
            if (msg.type === 'shell.created') {
              attached = true;
              setTimeout(() => {
                ws.send(new TextEncoder().encode("env | grep -E '^(LANG|LC_CTYPE)='\n"));
              }, 1000);
            }
          } catch(e) {}
        } else if (attached && event.data instanceof Blob) {
          event.data.arrayBuffer().then(buf => {
            output += new TextDecoder().decode(buf);
            if (output.includes('LANG=') && output.includes('LC_CTYPE=')) {
              clearTimeout(timeout);
              setTimeout(() => {
                ws.send(JSON.stringify({ type: 'shell.close', session_id: sessionId }));
                ws.close();
                resolve(output);
              }, 500);
            }
          });
        }
      };
      ws.onerror = () => { clearTimeout(timeout); resolve('ERROR'); };
    });

    const langMatch = localeResult.match(/LANG=(\S+)/);
    const lcMatch = localeResult.match(/LC_CTYPE=(\S+)/);
    const lang = langMatch ? langMatch[1] : '';
    const lcCtype = lcMatch ? lcMatch[1] : '';
    const hasUtf8 = /utf-?8/i.test(lang) || /utf-?8/i.test(lcCtype);

    assert(
      'pty_utf8_locale',
      hasUtf8,
      'LANG=' + lang + ' LC_CTYPE=' + lcCtype + ' (no UTF-8 found in env output)'
    );
  } catch (e) {
    log('dim', '  SKIP [pty_utf8_locale] shell server not available: ' + e.message);
  }

  // ─────────────────────────────────────────────────────────────────
  // Summary
  // ─────────────────────────────────────────────────────────────────
  term.dispose();
  log('', '');
  if (failed === 0) {
    log('pass', '=== ALL ' + passed + ' TESTS PASSED ===');
  } else {
    log('fail', '=== ' + failed + ' FAILED, ' + passed + ' passed ===');
  }

  document.body.setAttribute('data-results', JSON.stringify({ passed, failed, results }));
  console.log('[IME-BUG-RESULT] ' + JSON.stringify({ passed, failed, results }));
}

runTests();
</script>
</body>
</html>
