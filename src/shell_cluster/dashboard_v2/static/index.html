<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Shell Cluster</title>
<link rel="stylesheet" href="xterm.min.css">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="sidebar">
  <div id="sidebar-header">
    <span>&#x2726;</span> Shell Cluster
  </div>
  <div id="peer-list"></div>
  <div id="sidebar-footer">
    <button id="btn-refresh" onclick="refreshAll()">&#x21bb; Refresh</button>
    <button id="btn-discover" onclick="discoverPeers()">&#x1F50D; Discover</button>
  </div>
</div>

<div id="main">
  <div id="tab-bar"></div>
  <div id="terminal-container">
    <div id="welcome">
      <div>
        Select a peer and click <b>+</b> to open a new shell<br>
        or click an existing session to reconnect
      </div>
    </div>
  </div>
</div>

<script src="xterm.min.js"></script>
<script src="addon-fit.min.js"></script>
<script src="addon-attach.min.js"></script>
<script src="app.js"></script>
</body>
</html>
