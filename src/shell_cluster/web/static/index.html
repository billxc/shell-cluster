<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Shell Cluster</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/css/xterm.min.css">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --sidebar-width: 260px;
  --bg: #1e1e2e;
  --bg-surface: #181825;
  --bg-hover: #313244;
  --bg-active: #45475a;
  --text: #cdd6f4;
  --text-dim: #6c7086;
  --green: #a6e3a1;
  --red: #f38ba8;
  --blue: #89b4fa;
  --yellow: #f9e2af;
  --accent: #cba6f7;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, monospace;
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  display: flex;
  overflow: hidden;
}

/* Sidebar */
#sidebar {
  width: var(--sidebar-width);
  min-width: var(--sidebar-width);
  background: var(--bg-surface);
  border-right: 1px solid var(--bg-hover);
  display: flex;
  flex-direction: column;
  height: 100vh;
}

#sidebar-header {
  padding: 16px;
  border-bottom: 1px solid var(--bg-hover);
  font-size: 14px;
  font-weight: 600;
  color: var(--accent);
  display: flex;
  align-items: center;
  gap: 8px;
}

#sidebar-header span { font-size: 16px; }

#peer-list {
  flex: 1;
  overflow-y: auto;
  padding: 8px;
}

.peer-group {
  margin-bottom: 2px;
}

.peer-header {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 10px;
  border-radius: 6px;
  font-size: 13px;
  font-weight: 500;
  user-select: none;
}

.peer-header:hover { background: var(--bg-hover); }

.peer-status {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}

.peer-status.online { background: var(--green); }
.peer-status.offline { background: var(--red); }
.peer-status.connecting { background: var(--yellow); }

.peer-name {
  flex: 1;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.peer-actions {
  display: flex;
  gap: 4px;
  opacity: 0;
  transition: opacity 0.15s;
}

.peer-header:hover .peer-actions { opacity: 1; }

.peer-btn {
  background: none;
  border: none;
  color: var(--text-dim);
  cursor: pointer;
  font-size: 15px;
  padding: 0 2px;
  line-height: 1;
  border-radius: 3px;
}

.peer-btn:hover { color: var(--text); background: var(--bg-active); }

.peer-sessions {
  overflow: hidden;
}

.peer-sessions.collapsed {
  display: none;
}

.session-item {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 5px 10px 5px 26px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 12px;
  color: var(--text-dim);
  transition: background 0.1s;
}

.session-item:hover { background: var(--bg-hover); color: var(--text); }
.session-item.active { background: var(--bg-active); color: var(--text); }

.session-icon { font-size: 13px; flex-shrink: 0; }

.session-label {
  flex: 1;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.session-time {
  font-size: 10px;
  color: var(--text-dim);
  opacity: 0.7;
  flex-shrink: 0;
}

.session-item.remote {
  opacity: 0.65;
  border-left: 2px solid var(--blue);
  margin-left: 2px;
  padding-left: 24px;
}

.session-item.remote:hover {
  opacity: 1;
  background: var(--bg-hover);
  color: var(--blue);
}

.loading-hint {
  padding: 6px 10px 6px 26px;
  font-size: 11px;
  color: var(--text-dim);
  opacity: 0.5;
}

.no-sessions-hint {
  padding: 6px 10px 6px 26px;
  font-size: 11px;
  color: var(--text-dim);
  opacity: 0.6;
  font-style: italic;
}

#sidebar-footer {
  padding: 10px 12px;
  border-top: 1px solid var(--bg-hover);
  display: flex;
  gap: 8px;
}

#sidebar-footer button {
  flex: 1;
  padding: 6px 12px;
  background: var(--bg-hover);
  color: var(--text);
  border: none;
  border-radius: 6px;
  cursor: pointer;
  font-size: 12px;
  transition: background 0.15s;
}

#sidebar-footer button:hover { background: var(--bg-active); }
#sidebar-footer button:disabled { opacity: 0.4; cursor: default; }

/* Main area */
#main {
  flex: 1;
  display: flex;
  flex-direction: column;
  height: 100vh;
  min-width: 0;
}

/* Tab bar */
#tab-bar {
  display: flex;
  background: var(--bg-surface);
  border-bottom: 1px solid var(--bg-hover);
  overflow-x: auto;
  min-height: 36px;
}

#tab-bar::-webkit-scrollbar { height: 2px; }
#tab-bar::-webkit-scrollbar-thumb { background: var(--bg-active); }

.tab {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 8px 14px;
  font-size: 12px;
  color: var(--text-dim);
  cursor: pointer;
  border-bottom: 2px solid transparent;
  white-space: nowrap;
  flex-shrink: 0;
  transition: color 0.1s, background 0.1s;
}

.tab:hover { color: var(--text); background: var(--bg-hover); }
.tab.active { color: var(--text); border-bottom-color: var(--accent); }

.tab-close {
  font-size: 14px;
  opacity: 0;
  cursor: pointer;
  margin-left: 4px;
  transition: opacity 0.1s;
}

.tab:hover .tab-close { opacity: 0.5; }
.tab-close:hover { opacity: 1 !important; color: var(--red); }

/* Terminal area */
#terminal-container {
  flex: 1;
  position: relative;
  overflow: hidden;
}

.terminal-pane {
  position: absolute;
  inset: 0;
  display: none;
  padding: 4px;
}

.terminal-pane.active { display: block; }

/* Welcome */
#welcome {
  display: flex;
  align-items: center;
  justify-content: center;
  height: 100%;
  color: var(--text-dim);
  font-size: 14px;
  text-align: center;
  line-height: 2;
}
</style>
</head>
<body>

<div id="sidebar">
  <div id="sidebar-header">
    <span>&#x2726;</span> Shell Cluster
  </div>
  <div id="peer-list"></div>
  <div id="sidebar-footer">
    <button id="btn-refresh" onclick="refreshAll()">&#x21bb; Refresh</button>
  </div>
</div>

<div id="main">
  <div id="tab-bar"></div>
  <div id="terminal-container">
    <div id="welcome">
      <div>
        Select a peer and click <b>+</b> to open a new shell<br>
        or click an existing session to reconnect
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/lib/xterm.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@xterm/addon-fit@0.10.0/lib/addon-fit.min.js"></script>
<script>
// --- State ---
let PEERS = [];
const sessions = new Map();        // tabId -> session state (locally connected)
const remoteSessions = new Map();   // peer.name -> [{id, shell, created_at}]
const collapsedPeers = new Set();   // peer names that are collapsed
let activeTab = null;
let tabCounter = 0;
let loadingSessions = false;

// --- Fetch peers from daemon ---
async function fetchPeers() {
  try {
    const resp = await fetch('/api/peers');
    PEERS = await resp.json();
  } catch (e) {
    console.warn('Failed to fetch peers:', e);
  }
  renderPeers();
}

// --- Fetch sessions from each peer directly (parallel) ---
async function fetchSessions() {
  loadingSessions = true;
  renderPeers();
  const newRemote = new Map();

  // Query each peer's /sessions HTTP endpoint in parallel
  const promises = PEERS.map(async (peer) => {
    if (!peer.uri) return;
    try {
      // Derive HTTP URL from ws:// URI: ws://localhost:PORT -> http://localhost:PORT/sessions
      const httpUrl = peer.uri.replace(/^ws(s?):\/\//, (_, s) => `http${s}://`) + '/sessions';
      const resp = await fetch(httpUrl, { signal: AbortSignal.timeout(3000) });
      const peerSessions = await resp.json();
      if (!Array.isArray(peerSessions)) return;
      // Filter out sessions we already have connected locally (skip disconnected)
      const connectedIds = new Set();
      for (const [, s] of sessions) {
        if (s.peerName === peer.name && !s._disconnected) connectedIds.add(s.sessionId);
      }
      const remote = peerSessions.filter(s => !connectedIds.has(s.id));
      newRemote.set(peer.name, remote);
    } catch (e) {
      console.debug(`Failed to fetch sessions from ${peer.name}:`, e);
    }
  });

  await Promise.allSettled(promises);

  remoteSessions.clear();
  for (const [k, v] of newRemote) remoteSessions.set(k, v);

  loadingSessions = false;
  renderPeers();
}

// --- Refresh everything ---
async function refreshAll() {
  const btn = document.getElementById('btn-refresh');
  btn.disabled = true;
  btn.textContent = '... Loading';
  try {
    await fetchPeers();
    await fetchSessions();
  } finally {
    btn.disabled = false;
    btn.textContent = '\u21bb Refresh';
  }
}

// --- Peer list rendering ---
function renderPeers() {
  const list = document.getElementById('peer-list');
  list.innerHTML = '';

  for (const peer of PEERS) {
    const group = document.createElement('div');
    group.className = 'peer-group';

    const isCollapsed = collapsedPeers.has(peer.name);

    // Peer header
    const header = document.createElement('div');
    header.className = 'peer-header';

    const validStatuses = ['online', 'offline', 'connecting'];
    const statusClass = validStatuses.includes(peer.status) ? peer.status : 'online';
    header.innerHTML = `
      <span class="peer-status ${statusClass}"></span>
      <span class="peer-name">${esc(peer.name)}</span>
      <span class="peer-actions">
        <button class="peer-btn" title="New shell" data-action="new">+</button>
        <button class="peer-btn" title="${isCollapsed ? 'Expand' : 'Collapse'}" data-action="toggle">${isCollapsed ? '\u25B6' : '\u25BC'}</button>
      </span>
    `;
    header.addEventListener('click', (e) => {
      const action = e.target.closest('[data-action]');
      if (action) {
        e.stopPropagation();
        if (action.dataset.action === 'new') {
          createSession(peer);
        } else if (action.dataset.action === 'toggle') {
          togglePeer(peer.name);
        }
      } else {
        togglePeer(peer.name);
      }
    });
    group.appendChild(header);

    // Sessions container
    const sessionsDiv = document.createElement('div');
    sessionsDiv.className = 'peer-sessions' + (isCollapsed ? ' collapsed' : '');

    // Connected sessions (local)
    let hasAny = false;
    for (const [tabId, s] of sessions) {
      if (s.peerName === peer.name) {
        hasAny = true;
        const item = document.createElement('div');
        const isDisconnected = s._disconnected;
        item.className = 'session-item' + (tabId === activeTab ? ' active' : '');
        if (isDisconnected) item.style.opacity = '0.5';
        item.innerHTML = `
          <span class="session-icon">${isDisconnected ? '&#x25CB;' : '&#x25B8;'}</span>
          <span class="session-label">${esc(s.shell || 'shell')} #${s.sessionId.slice(0,6)}${isDisconnected ? ' (disconnected)' : ''}</span>
        `;
        item.onclick = (e) => { e.stopPropagation(); switchTab(tabId); };
        sessionsDiv.appendChild(item);
      }
    }

    // Remote sessions (on server but not locally connected)
    const remote = remoteSessions.get(peer.name) || [];
    for (const rs of remote) {
      hasAny = true;
      const item = document.createElement('div');
      item.className = 'session-item remote';
      const age = rs.created_at ? timeAgo(rs.created_at) : '';
      item.innerHTML = `
        <span class="session-icon" style="color:var(--blue)">&#x21bb;</span>
        <span class="session-label">${esc(rs.shell || 'shell')} #${rs.id.slice(0,6)}</span>
        ${age ? `<span class="session-time">${age}</span>` : ''}
      `;
      item.title = 'Click to reconnect to this session';
      item.onclick = (e) => { e.stopPropagation(); createSession(peer, rs.id); };
      sessionsDiv.appendChild(item);
    }

    // Loading state
    if (loadingSessions && !hasAny) {
      const hint = document.createElement('div');
      hint.className = 'loading-hint';
      hint.textContent = 'Loading sessions...';
      sessionsDiv.appendChild(hint);
    }

    // No sessions hint
    if (!loadingSessions && !hasAny) {
      const hint = document.createElement('div');
      hint.className = 'no-sessions-hint';
      hint.textContent = 'No active sessions';
      sessionsDiv.appendChild(hint);
    }

    group.appendChild(sessionsDiv);
    list.appendChild(group);
  }
}

function togglePeer(name) {
  if (collapsedPeers.has(name)) {
    collapsedPeers.delete(name);
  } else {
    collapsedPeers.add(name);
  }
  renderPeers();
}

// --- Tabs ---
function renderTabs() {
  const bar = document.getElementById('tab-bar');
  bar.innerHTML = '';

  for (const [tabId, s] of sessions) {
    const tab = document.createElement('div');
    tab.className = 'tab' + (tabId === activeTab ? ' active' : '');
    tab.innerHTML = `
      ${esc(s.peerName)}:${esc(s.shell || '?')}
      <span class="tab-close" onclick="event.stopPropagation(); closeSession('${tabId}')">&#x2715;</span>
    `;
    tab.onclick = () => switchTab(tabId);
    bar.appendChild(tab);
  }
}

function switchTab(tabId) {
  activeTab = tabId;

  document.querySelectorAll('.terminal-pane').forEach(p => p.classList.remove('active'));
  const welcome = document.getElementById('welcome');

  const s = sessions.get(tabId);
  if (s && s.pane) {
    s.pane.classList.add('active');
    welcome.style.display = 'none';
    setTimeout(() => {
      s.fitAddon.fit();
      s.term.focus();
    }, 10);
  }

  renderTabs();
  renderPeers();
}

// --- Session management ---
function createSession(peer, existingSessionId) {
  const tabId = `tab-${++tabCounter}`;
  const isAttach = !!existingSessionId;

  // If reconnecting, remove from remoteSessions
  if (isAttach) {
    const remote = remoteSessions.get(peer.name) || [];
    remoteSessions.set(peer.name, remote.filter(r => r.id !== existingSessionId));
  }

  const pane = document.createElement('div');
  pane.className = 'terminal-pane';
  pane.id = tabId;
  document.getElementById('terminal-container').appendChild(pane);

  const term = new Terminal({
    cursorBlink: true,
    fontSize: 14,
    fontFamily: "'JetBrains Mono', 'Fira Code', 'Cascadia Code', Menlo, monospace",
    theme: {
      background: '#1e1e2e',
      foreground: '#cdd6f4',
      cursor: '#f5e0dc',
      selectionBackground: '#45475a',
      black: '#45475a',
      red: '#f38ba8',
      green: '#a6e3a1',
      yellow: '#f9e2af',
      blue: '#89b4fa',
      magenta: '#cba6f7',
      cyan: '#94e2d5',
      white: '#bac2de',
    },
  });
  const fitAddon = new FitAddon.FitAddon();
  term.loadAddon(fitAddon);
  term.open(pane);
  fitAddon.fit();

  const wsUrl = `ws://${location.host}`;
  const ws = new WebSocket(wsUrl);
  const sessionId = existingSessionId || genId();

  const sessionState = {
    ws, term, peerName: peer.name, sessionId, pane, fitAddon,
    shell: '', targetUri: peer.uri,
  };
  sessions.set(tabId, sessionState);

  term.writeln(`\x1b[2m${isAttach ? 'Reconnecting' : 'Connecting'} to ${peer.name}...\x1b[0m`);

  ws.onopen = () => {
    ws.send(JSON.stringify({ target: peer.uri }));
  };

  let gotCreated = false;

  ws.onmessage = (event) => {
    const data = event.data;
    try {
      const msg = JSON.parse(data);

      if (msg.type === 'peer.info') {
        const cols = term.cols;
        const rows = term.rows;
        if (isAttach) {
          ws.send(JSON.stringify({
            type: 'shell.attach',
            session_id: sessionId,
            cols, rows,
          }));
        } else {
          ws.send(JSON.stringify({
            type: 'shell.create',
            session_id: sessionId,
            shell: '',
            cols, rows,
          }));
        }
        return;
      }

      if (msg.type === 'shell.created' || msg.type === 'shell.attached') {
        sessionState.shell = msg.shell || '?';
        gotCreated = true;
        renderTabs();
        renderPeers();
        if (!isAttach) {
          term.writeln(`\x1b[2mShell: ${msg.shell} (${msg.session_id})\x1b[0m\r\n`);
        } else {
          term.writeln(`\x1b[2mReconnected to ${msg.shell} (${msg.session_id})\x1b[0m\r\n`);
        }
        return;
      }

      if (msg.type === 'shell.data' && msg.data) {
        const raw = atob(msg.data);
        const bytes = new Uint8Array(raw.length);
        for (let i = 0; i < raw.length; i++) bytes[i] = raw.charCodeAt(i);
        term.write(bytes);
        return;
      }

      if (msg.type === 'shell.closed') {
        term.writeln('\r\n\x1b[2m[Session closed]\x1b[0m');
        return;
      }

      if (msg.type === 'error') {
        term.writeln(`\r\n\x1b[31mError: ${msg.error}\x1b[0m`);
        return;
      }

    } catch (e) {
      term.write(data);
    }
  };

  ws.onclose = () => {
    term.writeln('\r\n\x1b[2m[Disconnected]\x1b[0m');
    sessionState._disconnected = true;
    renderPeers();
  };

  ws.onerror = () => {
    term.writeln('\r\n\x1b[31m[Connection error]\x1b[0m');
  };

  term.onData((data) => {
    if (ws.readyState === WebSocket.OPEN && gotCreated) {
      const encoded = new TextEncoder().encode(data);
      const b64 = btoa(String.fromCharCode(...encoded));
      ws.send(JSON.stringify({
        type: 'shell.data',
        session_id: sessionId,
        data: b64,
      }));
    }
  });

  term.onResize(({ cols, rows }) => {
    if (ws.readyState === WebSocket.OPEN && gotCreated) {
      ws.send(JSON.stringify({
        type: 'shell.resize',
        session_id: sessionId,
        cols, rows,
      }));
    }
  });

  const resizeObserver = new ResizeObserver(() => {
    if (activeTab === tabId) {
      fitAddon.fit();
    }
  });
  resizeObserver.observe(pane);
  sessionState._resizeObserver = resizeObserver;

  switchTab(tabId);
}

function closeSession(tabId) {
  const s = sessions.get(tabId);
  if (!s) return;

  if (s.ws.readyState === WebSocket.OPEN) {
    try {
      s.ws.send(JSON.stringify({
        type: 'shell.close',
        session_id: s.sessionId,
      }));
    } catch (e) {}
    s.ws.close();
  }

  s.term.dispose();
  s._resizeObserver?.disconnect();
  s.pane.remove();
  sessions.delete(tabId);

  if (activeTab === tabId) {
    const remaining = [...sessions.keys()];
    if (remaining.length > 0) {
      switchTab(remaining[remaining.length - 1]);
    } else {
      activeTab = null;
      document.getElementById('welcome').style.display = 'flex';
      renderTabs();
    }
  }

  renderPeers();
  renderTabs();
}

// --- Helpers ---
function genId() {
  return Math.random().toString(16).slice(2, 14);
}

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function timeAgo(isoStr) {
  try {
    const then = new Date(isoStr);
    const now = new Date();
    const sec = Math.floor((now - then) / 1000);
    if (sec < 60) return 'just now';
    const min = Math.floor(sec / 60);
    if (min < 60) return `${min}m`;
    const hr = Math.floor(min / 60);
    if (hr < 24) return `${hr}h`;
    const day = Math.floor(hr / 24);
    return `${day}d`;
  } catch (e) {
    return '';
  }
}

// --- Keyboard shortcuts ---
document.addEventListener('keydown', (e) => {
  // Alt+[ / Alt+] to switch tabs (Ctrl+Tab is intercepted by browsers)
  if (e.altKey && (e.key === '[' || e.key === ']')) {
    e.preventDefault();
    const tabIds = [...sessions.keys()];
    if (tabIds.length < 2) return;
    const idx = tabIds.indexOf(activeTab);
    const next = e.key === '['
      ? (idx - 1 + tabIds.length) % tabIds.length
      : (idx + 1) % tabIds.length;
    switchTab(tabIds[next]);
  }
});

// --- Init ---
async function init() {
  await fetchPeers();
  await fetchSessions();
  renderTabs();
}
init();

// Retry at startup for late-starting peers
setTimeout(() => fetchPeers().then(fetchSessions), 3000);
setTimeout(() => fetchPeers().then(fetchSessions), 10000);

// Periodic refresh
setInterval(async () => {
  await fetchPeers();
  await fetchSessions();
}, 30000);

// Global resize
window.addEventListener('resize', () => {
  if (activeTab) {
    const s = sessions.get(activeTab);
    if (s) s.fitAddon.fit();
  }
});
</script>
</body>
</html>
